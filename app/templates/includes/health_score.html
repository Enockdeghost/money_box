<div class="bg-white rounded-lg shadow p-6">
    <h3 class="text-lg font-semibold mb-4">Financial Health Score</h3>
    <div class="flex items-center justify-center">
        <div class="relative w-32 h-32">
            <svg class="w-full h-full" viewBox="0 0 36 36">
                <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#E5E7EB" stroke-width="3" stroke-dasharray="100, 100"/>
                <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#4F46E5" stroke-width="3" stroke-dasharray="{{ health_score }}, 100" stroke-dashoffset="25"/>
            </svg>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center">
                <span class="text-3xl font-bold text-indigo-600">{{ health_score }}</span>
                <span class="text-xs text-gray-500 block">out of 100</span>
            </div>
        </div>
    </div>
    <p class="text-sm text-gray-600 text-center mt-4">{{ health_message }}</p>
</div>
