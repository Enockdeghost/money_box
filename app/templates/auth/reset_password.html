<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - MoneyBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <i class="fas fa-lock-open text-indigo-600 text-4xl mb-4"></i>
                <h2 class="text-2xl font-bold">Set New Password</h2>
            </div>
            <form method="post">
                {{ form.hidden_tag() }}
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
                    {{ form.password(class="border rounded-lg w-full px-3 py-2", placeholder="••••••••") }}
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Confirm Password</label>
                    {{ form.confirm_password(class="border rounded-lg w-full px-3 py-2", placeholder="••••••••") }}
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
