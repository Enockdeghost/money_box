<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Auth - MoneyBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <i class="fas fa-shield-alt text-indigo-600 text-4xl mb-4"></i>
                <h2 class="text-2xl font-bold">Two-Factor Authentication</h2>
                <p class="text-gray-600">Enter the 6-digit code from your authenticator app.</p>
            </div>
            <form method="post">
                {{ form.hidden_tag() }}
                <div class="mb-6">
                    <input type="text" name="token" class="border rounded-lg w-full px-3 py-3 text-center text-2xl tracking-widest" placeholder="000000" maxlength="6" pattern="\d*" inputmode="numeric" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Verify</button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600">
                <a href="{{ url_for('auth.login') }}" class="text-indigo-600 hover:underline">Back to login</a>
            </p>
        </div>
    </div>
</body>
</html>
