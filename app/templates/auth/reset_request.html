<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MoneyBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <i class="fas fa-key text-indigo-600 text-4xl mb-4"></i>
                <h2 class="text-2xl font-bold">Reset Password</h2>
                <p class="text-gray-600">Enter your email to receive a reset link.</p>
            </div>
            <form method="post">
                {{ form.hidden_tag() }}
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    {{ form.email(class="border rounded-lg w-full px-3 py-2", placeholder="your@email.com") }}
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                    Send Reset Link
                </button>
            </form>
            <div class="mt-4 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-indigo-600 hover:underline">Back to login</a>
            </div>
        </div>
    </div>
</body>
</html>
