{% extends "base.html" %}
{% block title %}Reports - MoneyBox{% endblock %}
{% block content %}
<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-2xl font-semibold mb-6">Financial Reports</h2>
    <form method="get" class="mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
        <select name="type" class="border rounded-lg px-3 py-2">
            <option value="income_vs_expense" {% if request.args.get('type')=='income_vs_expense' %}selected{% endif %}>Income vs Expense</option>
            <option value="category_breakdown" {% if request.args.get('type')=='category_breakdown' %}selected{% endif %}>Category Breakdown</option>
            <option value="net_worth" {% if request.args.get('type')=='net_worth' %}selected{% endif %}>Net Worth History</option>
        </select>
        <select name="period" class="border rounded-lg px-3 py-2">
            <option value="this_month" {% if request.args.get('period')=='this_month' %}selected{% endif %}>This Month</option>
            <option value="last_month" {% if request.args.get('period')=='last_month' %}selected{% endif %}>Last Month</option>
            <option value="this_year" {% if request.args.get('period')=='this_year' %}selected{% endif %}>This Year</option>
            <option value="custom" {% if request.args.get('period')=='custom' %}selected{% endif %}>Custom</option>
        </select>
        <button type="submit" class="bg-indigo-600 text-white rounded-lg px-4 py-2 hover:bg-indigo-700">Generate</button>
    </form>

    <div class="mt-8 h-96">
        <canvas id="reportChart"></canvas>
    </div>

    <div class="mt-8 text-right">
        <a href="{{ url_for('reports.export', format='pdf', **request.args) }}" class="inline-flex items-center px-4 py-2 border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50 mr-2">
            <i class="fas fa-file-pdf mr-2"></i>Export PDF
        </a>
        <a href="{{ url_for('reports.export', format='csv', **request.args) }}" class="inline-flex items-center px-4 py-2 border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50">
            <i class="fas fa-file-csv mr-2"></i>Export CSV
        </a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch("{{ url_for('reports.report_data', **request.args) }}")
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('reportChart').getContext('2d');
                new Chart(ctx, {
                    type: data.type || 'line',
                    data: data,
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });
    });
</script>
{% endblock %}
